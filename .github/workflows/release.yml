name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: DroidBridge-linux-amd64
          - os: windows-latest
            artifact: DroidBridge-windows-amd64.exe
          - os: macos-latest
            artifact: DroidBridge-macos-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ---------- BUILD ----------

      - name: Build (Linux)
        if: matrix.os == 'ubuntu-latest'
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          pyinstaller app.py \
            --onefile \
            --name DroidBridge \
            --strip \
            --hidden-import PySide6.QtWidgets \
            --hidden-import PySide6.QtCore \
            --hidden-import PySide6.QtGui \
            --collect-submodules PySide6.QtWidgets \
            --collect-submodules PySide6.QtCore \
            --collect-submodules PySide6.QtGui \
            --exclude-module PySide6.QtWebEngine \
            --exclude-module PySide6.QtWebEngineCore \
            --exclude-module PySide6.QtWebEngineWidgets \
            --exclude-module PySide6.QtMultimedia \
            --exclude-module PySide6.QtMultimediaWidgets \
            --exclude-module PySide6.QtQml \
            --exclude-module PySide6.QtQuick \
            --exclude-module PySide6.QtQuickWidgets \
            --exclude-module PySide6.Qt3DCore \
            --exclude-module PySide6.Qt3DRender \
            --exclude-module PySide6.QtCharts \
            --exclude-module PySide6.QtDataVisualization \
            --exclude-module PySide6.QtDesigner \
            --exclude-module PySide6.QtHelp \
            --exclude-module PySide6.QtNetwork \
            --exclude-module PySide6.QtSql \
            --exclude-module PySide6.QtSvg \
            --exclude-module PySide6.QtBluetooth \
            --exclude-module PySide6.QtPositioning \
            --exclude-module PySide6.QtSensors

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          pyinstaller app.py \
            --onefile \
            --windowed \
            --name DroidBridge \
            --strip \
            --hidden-import PySide6.QtWidgets \
            --hidden-import PySide6.QtCore \
            --hidden-import PySide6.QtGui \
            --collect-submodules PySide6.QtWidgets \
            --collect-submodules PySide6.QtCore \
            --collect-submodules PySide6.QtGui \
            --exclude-module PySide6.QtWebEngine \
            --exclude-module PySide6.QtWebEngineCore \
            --exclude-module PySide6.QtWebEngineWidgets \
            --exclude-module PySide6.QtMultimedia \
            --exclude-module PySide6.QtMultimediaWidgets \
            --exclude-module PySide6.QtQml \
            --exclude-module PySide6.QtQuick \
            --exclude-module PySide6.QtQuickWidgets \
            --exclude-module PySide6.Qt3DCore \
            --exclude-module PySide6.Qt3DRender \
            --exclude-module PySide6.QtCharts \
            --exclude-module PySide6.QtDataVisualization \
            --exclude-module PySide6.QtDesigner \
            --exclude-module PySide6.QtHelp \
            --exclude-module PySide6.QtNetwork \
            --exclude-module PySide6.QtSql \
            --exclude-module PySide6.QtSvg \
            --exclude-module PySide6.QtBluetooth \
            --exclude-module PySide6.QtPositioning \
            --exclude-module PySide6.QtSensors

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller app.py \
            --onefile \
            --windowed \
            --name DroidBridge \
            --strip \
            --hidden-import PySide6.QtWidgets \
            --hidden-import PySide6.QtCore \
            --hidden-import PySide6.QtGui \
            --collect-submodules PySide6.QtWidgets \
            --collect-submodules PySide6.QtCore \
            --collect-submodules PySide6.QtGui \
            --exclude-module PySide6.QtWebEngine \
            --exclude-module PySide6.QtWebEngineCore \
            --exclude-module PySide6.QtWebEngineWidgets \
            --exclude-module PySide6.QtMultimedia \
            --exclude-module PySide6.QtMultimediaWidgets \
            --exclude-module PySide6.QtQml \
            --exclude-module PySide6.QtQuick \
            --exclude-module PySide6.QtQuickWidgets \
            --exclude-module PySide6.Qt3DCore \
            --exclude-module PySide6.Qt3DRender \
            --exclude-module PySide6.QtCharts \
            --exclude-module PySide6.QtDataVisualization \
            --exclude-module PySide6.QtDesigner \
            --exclude-module PySide6.QtHelp \
            --exclude-module PySide6.QtNetwork \
            --exclude-module PySide6.QtSql \
            --exclude-module PySide6.QtSvg \
            --exclude-module PySide6.QtBluetooth \
            --exclude-module PySide6.QtPositioning \
            --exclude-module PySide6.QtSensors

      # ---------- PACKAGE ----------

      - name: Package Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir release
          cp dist/DroidBridge release/
          cd release
          tar -czf DroidBridge-linux-amd64.tar.gz DroidBridge
          rm DroidBridge

      - name: Package Windows
        if: matrix.os == 'windows-latest'
        run: |
          mkdir release
          copy dist\DroidBridge.exe release\DroidBridge-windows-amd64.exe
          powershell Compress-Archive -Path release\DroidBridge-windows-amd64.exe -DestinationPath release\DroidBridge-windows-amd64.zip
          del release\DroidBridge-windows-amd64.exe

      - name: Package macOS
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p release
          cd dist
          zip -r DroidBridge-macos-amd64.zip DroidBridge.app
          mv DroidBridge-macos-amd64.zip ../release/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}
          path: release/

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          cp -r artifacts/*/* release/ || true
          ls -la release

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
